{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-shell">
    <div class="card auth-card">
        <div class="auth-heading">
            <h2>Welcome back</h2>
            <p>Sign in to manage students, attendance, and classes.</p>
        </div>

        <form method="POST">
            {% if next_url %}<input type="hidden" name="next" value="{{ next_url }}">{% endif %}
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" required class="form-input">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" required class="form-input">
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">Login</button>
        </form>

        <p style="text-align:center; margin-top:1.25rem; color:var(--text-muted);">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}">Register</a>
        </p>
    </div>
</div>
{% endblock %}
