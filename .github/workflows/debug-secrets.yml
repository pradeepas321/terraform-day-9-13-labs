name: Debug Secrets

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets existence
        run: |
          if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "✅ AWS_ACCESS_KEY_ID exists"
          else
            echo "❌ AWS_ACCESS_KEY_ID missing"
          fi
          if [ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "✅ AWS_SECRET_ACCESS_KEY exists"
          else
            echo "❌ AWS_SECRET_ACCESS_KEY missing"
          fi
          if [ -n "${{ secrets.AWS_ACCOUNT_ID }}" ]; then
            echo "✅ AWS_ACCOUNT_ID exists"
          else
            echo "❌ AWS_ACCOUNT_ID missing"
          fi
