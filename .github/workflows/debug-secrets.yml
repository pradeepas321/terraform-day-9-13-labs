name: Debug Secrets

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret existence and first characters
        run: |
          if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "✅ AWS_ACCESS_KEY_ID exists, first 4 chars: ${#AWS_ACCESS_KEY_ID:0:4}"
          else
            echo "❌ AWS_ACCESS_KEY_ID missing"
          fi
          if [ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "✅ AWS_SECRET_ACCESS_KEY exists, first 4 chars: ${#AWS_SECRET_ACCESS_KEY:0:4}"
          else
            echo "❌ AWS_SECRET_ACCESS_KEY missing"
          fi
          if [ -n "${{ secrets.AWS_ACCOUNT_ID }}" ]; then
            echo "✅ AWS_ACCOUNT_ID exists, value: ${{ secrets.AWS_ACCOUNT_ID }}"
          else
            echo "❌ AWS_ACCOUNT_ID missing"
          fi
