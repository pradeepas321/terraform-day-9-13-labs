name: Build and Deploy to AWS with Terraform

on:
  # Manual trigger from the GitHub UI
  workflow_dispatch:
  # Uncomment below to auto-run on push to main branch
  # push:
  #   branches:
  #     - main

env:
  TF_VERSION: '1.5.0'          # Terraform version for consistency
  AWS_REGION: 'ap-south-1'     # Your AWS region

permissions:
  id-token: write              # Required for OIDC authentication
  contents: read

jobs:
  # ======================
  # 1. PLAN JOB
  # ======================
  terraform-plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    outputs:
      plan-exitcode: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@v4

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 'Configure AWS Credentials'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Option 1: OIDC (Recommended - most secure)
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com   # <-- Add this line
          # Option 2: Traditional Access Keys (uncomment if using)
          # aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          # aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: 'Debug backend.tf content'
        run: cat projects/apple/dev/backend.tf

      - name: 'Debug AWS Identity'
        run: aws sts get-caller-identity

      - name: 'Terraform Init'
        id: init
        run: terraform init
        working-directory: ./projects/apple/dev

      - name: 'Terraform Validate'
        id: validate
        run: terraform validate -no-color
        working-directory: ./projects/apple/dev

      - name: 'Terraform Plan'
        id: plan
        run: |
          terraform plan -no-color -out=tfplan
          echo "exitcode=$?" >> $GITHUB_OUTPUT
        working-directory: ./projects/apple/dev
        continue-on-error: true   # Allows plan to show output even if it fails

      - name: 'Upload Terraform Plan Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ./projects/apple/dev/tfplan
          retention-days: 1

  # ======================
  # 2. APPLY JOB
  # ======================
  terraform-apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: terraform-plan
    # Only run on main branch AND if plan had changes (exit code 2)
    if: github.ref == 'refs/heads/main' && needs.terraform-plan.outputs.plan-exitcode == '2'
    environment: 
      name: production   # Optional: Connect to GitHub Environments for approvals
    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@v4

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 'Configure AWS Credentials'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com   # <-- Add this line
      - name: 'Terraform Init'
        id: init
        run: terraform init
        working-directory: ./projects/apple/dev

      - name: 'Download Terraform Plan'
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ./projects/apple/dev

      - name: 'Terraform Apply'
        id: apply
        run: terraform apply -auto-approve tfplan
        working-directory: ./projects/apple/dev
