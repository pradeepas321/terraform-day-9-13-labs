name: Build and Deploy to AWS with Terraform

on:
  # Manual trigger from the GitHub UI
  workflow_dispatch:
  # Uncomment below to auto-run on push to main branch
  # push:
  #   branches:
  #     - main

env:
  TF_VERSION: '1.5.0'          # Terraform version for consistency
  AWS_REGION: 'ap-south-1'     # Your AWS region

permissions:
  id-token: write              # Required for OIDC authentication
  contents: read

jobs:
  # ======================================================
  # NEW: Build and push Docker image to ECR
  # ======================================================
  build-and-push:
    name: 'Build & Push Docker Image'
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.tag.outputs.image_uri }}
    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@v4

      - name: 'Configure AWS Credentials'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: 'Login to Amazon ECR'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 'Set image tag and URI'
        id: tag
        run: |
          # Use first 7 characters of commit SHA as tag
          IMAGE_TAG=${GITHUB_SHA::7}
          # Get ECR registry from login step
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_URI=${REGISTRY}/student-portal:${IMAGE_TAG}
          echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "Using image: ${IMAGE_URI}"

      - name: 'Build and Push Docker image'
        run: |
          cd src   # Dockerfile is inside src/
          docker build -t ${{ steps.tag.outputs.image_uri }} .
          docker push ${{ steps.tag.outputs.image_uri }}

  # ======================================================
  # 1. TERRAFORM PLAN (now depends on build-and-push)
  # ======================================================
  terraform-plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    needs: build-and-push   # Wait for image build/push to complete
    outputs:
      plan-exitcode: ${{ steps.plan.outputs.exitcode }}
    env:
      # Pass the new image URI to Terraform via environment variable
      TF_VAR_app_image: ${{ needs.build-and-push.outputs.image_uri }}
    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@v4

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 'Configure AWS Credentials'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      # (Optional debug steps – you can remove these if you like)
      - name: 'Debug backend.tf content'
        run: cat projects/apple/dev/backend.tf || echo "File not found (expected)"

      - name: 'Debug AWS Identity'
        run: aws sts get-caller-identity

      - name: 'Terraform Init'
        id: init
        run: terraform init
        working-directory: ./projects/apple/dev

      - name: 'Terraform Validate'
        id: validate
        run: terraform validate -no-color
        working-directory: ./projects/apple/dev

      - name: 'Terraform Plan'
        id: plan
        run: |
          terraform plan -no-color -out=tfplan
          echo "exitcode=$?" >> $GITHUB_OUTPUT
        working-directory: ./projects/apple/dev
        continue-on-error: true

      - name: 'Upload Terraform Plan Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ./projects/apple/dev/tfplan
          retention-days: 1

  # ======================================================
  # 2. TERRAFORM APPLY (uses plan from previous job)
  # ======================================================
  terraform-apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: terraform-plan   # Plan already depends on build-and-push, so this transitively waits
    if: needs.terraform-plan.outputs.plan-exitcode == '2'
    environment:
      name: production
    env:
      # Pass the same image URI to apply (though apply uses the saved plan)
      TF_VAR_app_image: ${{ needs.build-and-push.outputs.image_uri }}
    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@v4

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 'Configure AWS Credentials'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: 'Terraform Init'
        id: init
        run: terraform init
        working-directory: ./projects/apple/dev

      - name: 'Download Terraform Plan'
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ./projects/apple/dev

      - name: 'Terraform Apply'
        id: apply
        run: terraform apply -auto-approve tfplan
        working-directory: ./projects/apple/dev
